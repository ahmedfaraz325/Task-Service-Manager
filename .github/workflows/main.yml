name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Run Linter (Lint)
      run: npm run lint

    - name: Run Unit Tests (Test)
      run: npm run test

    - name: Compile Application (Build)
      run: npm run build

  continuous-deployment:
    needs: continuous-integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy Orchestration Trigger
      run: |
        echo "CI steps passed successfully. Triggering automatic cloud deployment mechanism..."
        echo "Deployment pipeline execution sequence completed successfully."