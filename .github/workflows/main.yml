name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 # Upgraded to v4 for faster code checkout

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4 # Upgraded to v4 for robust caching and runner stability
      with:
        node-version: '20' # Switched to latest stable Long-Term Support (LTS) version
        cache: 'npm' # Pipeline optimization via dependency caching

    - name: Install Dependencies
      run: npm install

    - name: Run Linter (Lint)
      run: npm run lint

    - name: Run Unit Tests (Test)
      run: npm run test

    - name: Compile Application (Build)
      run: npm run build